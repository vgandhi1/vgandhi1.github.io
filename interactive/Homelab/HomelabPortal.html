<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeLab Portal | datasharkvag.com</title>
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Use specific version of lucide for stability -->
    <script src="https://unpkg.com/lucide@0.263.1"></script>
    <!-- Mermaid JS for Diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap');
        body { font-family: 'Inter', sans-serif; font-size: 17px; line-height: 1.55; }
        .font-mono { font-family: 'Fira Code', monospace; }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Smooth transitions for tab switching */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Mermaid styling adjustment */
        .mermaid { 
            display: flex; 
            justify-content: center;
            width: 100%;
        }
        
        .mermaid-container {
            overflow-x: auto;
            overflow-y: auto;
            padding: 1.75rem 2rem;
            width: 100%;
            min-height: min(72vh, 920px);
            max-height: min(88vh, 1000px);
        }
        
        .mermaid svg {
            max-width: 100% !important;
            height: auto !important;
        }

        /* Sensor node detail schematic: larger tap targets and readable flow */
        .sensor-schematic {
            min-height: 11rem;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Initialize Mermaid
        mermaid.initialize({ 
            startOnLoad: true,
            theme: 'default',
            securityLevel: 'loose',
            fontFamily: 'Inter',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'basis',
                padding: 32,
                nodeSpacing: 120,
                rankSpacing: 150
            },
            themeVariables: {
                fontSize: '24px',
                fontFamily: 'Inter, sans-serif',
                primaryColor: '#e0e7ff',
                primaryTextColor: '#1e293b',
                primaryBorderColor: '#6366f1',
                lineColor: '#475569',
                secondaryColor: '#f1f5f9',
                tertiaryColor: '#ffffff',
                nodeTextColor: '#1e293b',
                mainBkgColor: '#ffffff',
                defaultLinkColor: '#475569'
            }
        });

        // Icon Component to handle Lucide Icons in React without a build step
        const Icon = ({ name, className }) => {
            // In the browser CDN version, icons are often at lucide.icons[name]
            // We use dangerouslySetInnerHTML because the library gives us SVG data
            // Alternatively, we let lucide.createIcons() handle it via data attributes
            
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('overview');

            // Re-run lucide.createIcons() whenever the active section changes
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                if (window.mermaid) {
                    // Slight delay to ensure DOM is ready for mermaid
                    setTimeout(() => {
                        window.mermaid.contentLoaded();
                    }, 100);
                }
            }, [activeSection]); // Add activeSection as dependency

            const navigation = [
                { id: 'overview', name: 'Architecture', icon: 'layout' },
                { id: 'docker', name: 'Docker Stack', icon: 'hard-drive' },
                { id: 'networking', name: 'Networking & SSL', icon: 'globe' },
                { id: 'pihole', name: 'Pi-hole (Remote)', icon: 'shield' },
                { id: 'sensornode', name: 'Sensor Node (Pi-hat)', icon: 'thermometer' },
                { id: 'commands', name: 'Linux Commands', icon: 'command' },
                { id: 'guides', name: 'Setup Guides', icon: 'book-open' },
            ];

            const sections = {
                overview: (
                    <div className="space-y-6">
                        <div className="flex justify-between items-center">
                            <h2 className="text-2xl font-bold text-slate-800">Homelab Architecture</h2>
                            <span className="px-4 py-1.5 bg-emerald-100 text-emerald-800 text-sm font-bold rounded-full">LIVE</span>
                        </div>

                        {/* Mermaid Diagram Container */}
                        <div className="bg-gradient-to-br from-slate-50 to-white rounded-xl border border-slate-200 shadow-sm mermaid-container">
                            <div className="mermaid">
{`flowchart LR
    User["🌐 User Device"]
    
    subgraph Access["🌐 Access Methods"]
        CF["☁️ Cloudflare Edge"]
        TS["🔐 Tailscale VPN"]
    end
    
    subgraph MainServer["🖥️ Main Server - Pi 4B"]
        direction TB
        Tunnel["🔒 Cloudflared Tunnel"]
        NPM["⚙️ Nginx Proxy Manager"]
        
        subgraph PublicApps["🌍 Public Apps"]
            Static["🌤️ WeatherApp"]
        end
        
        subgraph PrivateApps["🔒 Private Apps"]
            direction TB
            Nextcloud["☁️ Nextcloud"]
            Portainer["🐳 Portainer"]
        end
        
        subgraph MonitoringData["📊 Monitoring & Data"]
            direction TB
            Grafana["📊 Grafana"]
            HA["🏠 Home Assistant"]
            Influx["📈 InfluxDB"]
        end
        
        subgraph Storage["💾 Storage"]
            direction TB
            MariaDB["🗄️ MariaDB"]
            HDD[("💿 External HDD")]
        end
    end
    
    subgraph Remote["🌍 Remote Nodes"]
        direction TB
        PiZero["🛡️ Pi-hole"]
        Sensor["🌡️ Sensor Node"]
    end
    
    %% Public Flow - Cloudflare Tunnel
    User -->|HTTPS| CF
    CF -->|Tunnel| Tunnel
    Tunnel --> NPM
    NPM -->|Route| Static
    
    %% Private Flow - Tailscale VPN
    User -->|VPN| TS
    TS -->|Private| NPM
    NPM -->|Route| Nextcloud
    NPM -->|Route| Portainer
    NPM -->|Route| Grafana
    NPM -->|Route| HA
    
    %% Data Connections - Clean Layout
    Nextcloud --> MariaDB
    Nextcloud --> HDD
    Influx -->|Read| Grafana
    HA -->|Write| Influx

    %% Styling
    classDef internet fill:#e0f2fe,stroke:#0284c7,stroke-width:2px,color:#000
    classDef public fill:#fef3c7,stroke:#f59e0b,stroke-width:3px,color:#000
    classDef private fill:#dbeafe,stroke:#2563eb,stroke-width:2px,color:#000
    classDef vpn fill:#e0e7ff,stroke:#6366f1,stroke-width:2px,color:#000
    classDef router fill:#ede9fe,stroke:#7c3aed,stroke-width:3px,color:#000
    classDef data fill:#dcfce7,stroke:#16a34a,stroke-width:2px,color:#000
    classDef remote fill:#fce7f3,stroke:#db2777,stroke-width:2px,color:#000
    
    class User,CF internet
    class Tunnel,PublicApps public
    class TS,PrivateApps vpn
    class NPM router
    class Influx,MariaDB,HDD data
    class PiZero,Sensor remote`}
                            </div>
                        </div>

                            <div className="p-6 md:p-7 bg-amber-50 border border-amber-200 rounded-xl">

                                <p className="text-sm text-amber-600 mb-3">Accessible via Cloudflare Tunnel (public internet)</p>

                        <p className="text-slate-600 text-base leading-relaxed">The entire stack is deployed using a single Docker Compose file for high availability.</p>
                        <div className="bg-slate-800 rounded-xl p-6 md:p-7 font-mono text-sm md:text-base text-emerald-300 overflow-x-auto border border-slate-700">
                            <pre>{`services:
  nginx: # SSL termination & Proxy

                        <div className="grid gap-8">
                            {/* Local Config */}
                            <div className="p-7 md:p-8 bg-amber-50 border border-amber-200 rounded-xl">
                                <p className="text-amber-800 font-bold text-base flex items-center mb-3">

                                <p className="text-base text-amber-700 mb-3 leading-relaxed">

                            {/* Remote Config */}
                            <div className="p-7 md:p-8 bg-indigo-50 border border-indigo-200 rounded-xl">
                                <p className="text-indigo-800 font-bold text-base flex items-center mb-3">
                                    <Icon name="smartphone" className="mr-2 w-5 h-5" /> Remote Ad Blocking (Tailscale DNS Magic)
                                </p>
                                <p className="text-base text-indigo-700 mb-4 leading-relaxed">
                                    Enables ad-blocking on mobile devices anywhere in the world via VPN using Tailscale's global nameserver feature.
                                </p>
                                <div className="space-y-4 mt-4">
                                    <div className="bg-white p-5 md:p-6 rounded-xl border border-indigo-100">
                                        <p className="text-sm font-semibold text-indigo-900 mb-2">Step 1: Pi-hole Settings (Pi Zero)</p>
                                        <p className="text-sm text-slate-600 leading-relaxed">
                                            Go to <span className="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-xs">Settings &gt; DNS &gt; Interface Settings</span> and select 
                                            <span className="font-bold text-indigo-600"> "Permit all origins"</span>. 
                                            This is required because VPN traffic appears to come from the Tailscale subnet (100.x.x.x), not your local LAN.

                                            <li>Under "Global Nameservers", click "Add Nameserver".</li>
                                            <li>Enter the <strong>Tailscale IP Address</strong> of your Pi Zero.</li>
                                            <li>Enable <strong>"Override Local DNS"</strong>. This forces all connected devices to use Pi-hole for DNS, blocking ads even on cellular data.</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                ),
                sensornode: (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-bold text-slate-800">Sensor Node Architecture</h2>
                        <div className="bg-white p-7 md:p-8 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-base font-bold text-purple-600 mb-5 flex items-center uppercase tracking-wider">

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 mt-5 items-stretch sensor-schematic">
                                    <div className="p-6 md:p-8 bg-purple-50 rounded-xl border border-purple-100 text-center flex flex-col justify-center min-h-[12rem]">

                                        <Icon name="database" className="mx-auto text-emerald-500 mb-4 w-9 h-9" />

                                        <p className="text-sm text-emerald-700 mt-2">InfluxDB (Main Server)</p>
                                        <p className="text-sm text-emerald-600 mt-2">Port 8086</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-slate-800 rounded-xl p-7 md:p-8 text-white shadow-lg">

                            </h3>
                            <div className="font-mono text-sm overflow-x-auto leading-relaxed">
<pre>{`from sense_hat import SenseHat
from influxdb_client import InfluxDBClient, Point
from influxdb_client.client.write_api import SYNCHRONOUS
import time

# Configuration
INFLUX_URL = "http://192.168.1.50:8086" # IP of Main Server
INFLUX_TOKEN = "your-super-secret-auth-token"
INFLUX_ORG = "myorg"
INFLUX_BUCKET = "mybucket"

sense = SenseHat()
client = InfluxDBClient(url=INFLUX_URL, token=INFLUX_TOKEN, org=INFLUX_ORG)
write_api = client.write_api(write_options=SYNCHRONOUS)

while True:
    temp = sense.get_temperature()
    pressure = sense.get_pressure()
    humidity = sense.get_humidity()
    
    point = Point("environment") \\
        .field("temperature", temp) \\
        .field("pressure", pressure) \\
        .field("humidity", humidity)
        
    write_api.write(bucket=INFLUX_BUCKET, org=INFLUX_ORG, record=point)
    time.sleep(60) # Send every minute`}</pre>

                        <div className="bg-white p-7 md:p-8 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-base font-bold text-slate-800 mb-5 flex items-center uppercase tracking-wider">

                                    }`}
                                >
                                    <Icon name={item.icon} className="w-5 h-5" />
                                    <span className="font-medium text-base">{item.name}</span>
                                </button>
                            ))}
                        </div>

                        <div className="mt-8 pt-6 border-t border-slate-800">
                            <div className="p-4 bg-slate-800 rounded-xl">
                                <p className="text-xs text-slate-500 uppercase font-bold tracking-tighter mb-1.5">Active Root</p>
                                <p className="text-sm font-mono text-emerald-400">datasharkvag.com</p>
                            </div>
                        </div>
                    </nav>

                    {/* Content Area - Uses key to force re-render on section change to prevent DOM mismatch */}
                    <main className="flex-1 p-5 md:p-10 lg:p-12 overflow-y-auto">
                        <div 
                            key={activeSection}
                            className={`mx-auto bg-white rounded-3xl shadow-sm border border-slate-200 min-h-[500px] fade-in ${
                                activeSection === 'overview'
                                    ? 'max-w-7xl w-full p-7 md:p-10 lg:p-12'
                                    : 'max-w-4xl p-7 md:p-11 lg:p-12'
                            }`}
                        >
                            {sections[activeSection]}
                        </div>
                        <footer className="mt-10 text-center text-slate-400 text-xs uppercase tracking-widest">
                            © 2025 datasharkvag.com | Pi 4B Architecture (8GB RAM)
                        </footer>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
