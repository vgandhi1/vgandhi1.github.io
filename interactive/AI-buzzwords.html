<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Concepts & Trends Visualization Hub</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        
        .concept-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .concept-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        
        .animate-delay-100 { animation-delay: 0.1s; }
        .animate-delay-200 { animation-delay: 0.2s; }
        .animate-delay-300 { animation-delay: 0.3s; }
        .animate-delay-400 { animation-delay: 0.4s; }
        .animate-delay-500 { animation-delay: 0.5s; }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .temperature-bar {
            transition: all 0.5s ease;
        }
        
        .token-visual {
            transition: all 0.3s ease;
        }
        
        .agent-node {
            transition: all 0.3s ease;
        }
        
        .agent-node:hover {
            transform: scale(1.1);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        
        const lucideIcons = typeof lucide !== 'undefined' ? lucide : {};
        const Database = lucideIcons.Database || (() => <span>📊</span>);
        const Layers = lucideIcons.Layers || (() => <span>📚</span>);
        const Zap = lucideIcons.Zap || (() => <span>⚡</span>);
        const Brain = lucideIcons.Brain || (() => <span>🧠</span>);
        const Cpu = lucideIcons.Cpu || (() => <span>💻</span>);
        const Target = lucideIcons.Target || (() => <span>🎯</span>);
        const Sparkles = lucideIcons.Sparkles || (() => <span>✨</span>);
        const Bot = lucideIcons.Bot || (() => <span>🤖</span>);

        // --- 1. TRANSFORMER ARCHITECTURE ---
        const TransformerVisualizer = () => {
            const [selectedLayer, setSelectedLayer] = useState(null);
            
            const layers = [
                { id: 'input', name: 'Input Embedding', desc: 'Converts tokens to vectors' },
                { id: 'pos', name: 'Positional Encoding', desc: 'Adds position information' },
                { id: 'attention', name: 'Multi-Head Attention', desc: 'Self-attention mechanism' },
                { id: 'norm1', name: 'Layer Norm', desc: 'Normalizes activations' },
                { id: 'ffn', name: 'Feed Forward', desc: 'Neural network processing' },
                { id: 'norm2', name: 'Layer Norm', desc: 'Final normalization' },
                { id: 'output', name: 'Output', desc: 'Generates predictions' }
            ];
            
            return (
                <div className="glass-card rounded-3xl p-6 lg:p-8 shadow-xl mb-8 animate-fade-in">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl text-white">
                            <Brain size={28} />
                        </div>
                        <div>
                            <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">Transformer Architecture</h2>
                            <p className="text-slate-500 text-sm">The foundation of modern LLMs</p>
                        </div>
                    </div>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <div className="space-y-4">
                            <div className="bg-slate-50 rounded-xl p-4 border-2 border-slate-200">
                                <h3 className="font-bold text-slate-800 mb-3">Key Components</h3>
                                {layers.map((layer, idx) => (
                                    <div
                                        key={layer.id}
                                        onClick={() => setSelectedLayer(selectedLayer === layer.id ? null : layer.id)}
                                        className={`p-3 rounded-lg mb-2 cursor-pointer transition-all ${
                                            selectedLayer === layer.id
                                                ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-lg'
                                                : 'bg-white hover:bg-slate-100 border border-slate-200'
                                        }`}
                                    >
                                        <div className="flex items-center justify-between">
                                            <div>
                                                <div className="font-bold text-sm">{layer.name}</div>
                                                <div className={`text-xs ${selectedLayer === layer.id ? 'text-indigo-100' : 'text-slate-500'}`}>
                                                    {layer.desc}
                                                </div>
                                            </div>
                                            <div className="text-xs font-mono bg-white/20 px-2 py-1 rounded">
                                                {idx + 1}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="bg-indigo-50 rounded-xl p-4 border border-indigo-200">
                                <h4 className="font-bold text-indigo-900 mb-2">💡 Key Innovation</h4>
                                <p className="text-sm text-indigo-700">
                                    <strong>Self-Attention:</strong> Allows the model to weigh the importance of different words 
                                    in a sentence when processing each word. This enables understanding context and relationships 
                                    between distant words.
                                </p>
                            </div>
                        </div>
                        
                        <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-6 border-2 border-slate-200">
                            <h3 className="font-bold text-slate-800 mb-4 text-center">Architecture Flow</h3>
                            <div className="space-y-3">
                                {layers.map((layer, idx) => (
                                    <div key={layer.id} className="relative">
                                        <div className={`p-4 rounded-lg border-2 transition-all ${
                                            selectedLayer === layer.id
                                                ? 'bg-gradient-to-r from-indigo-500 to-purple-600 text-white border-indigo-600 shadow-lg scale-105'
                                                : 'bg-white border-slate-300'
                                        }`}>
                                            <div className="font-bold text-sm">{layer.name}</div>
                                        </div>
                                        {idx < layers.length - 1 && (
                                            <div className="text-center text-slate-400 my-1">↓</div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 2. TEMPERATURE PARAMETER ---
        const TemperatureVisualizer = () => {
            const [temperature, setTemperature] = useState(0.7);
            
            const getOutput = (temp) => {
                if (temp < 0.3) return {
                    text: "The cat sat on the mat.",
                    desc: "Deterministic, repetitive",
                    creativity: "Very Low"
                };
                if (temp < 0.7) return {
                    text: "The feline rested comfortably on the woven floor covering.",
                    desc: "Balanced, natural",
                    creativity: "Medium"
                };
                if (temp < 1.2) return {
                    text: "The graceful cat lounged elegantly upon the soft, textured mat.",
                    desc: "Creative, varied",
                    creativity: "High"
                };
                return {
                    text: "The magnificent whiskered creature gracefully positioned itself upon the luxurious textile surface with unparalleled elegance.",
                    desc: "Very creative, sometimes nonsensical",
                    creativity: "Very High"
                };
            };
            
            const output = getOutput(temperature);
            
            return (
                <div className="glass-card rounded-3xl p-6 lg:p-8 shadow-xl mb-8 animate-fade-in animate-delay-100">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-gradient-to-br from-orange-500 to-red-600 rounded-xl text-white">
                            <Zap size={28} />
                        </div>
                        <div>
                            <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">Temperature Parameter</h2>
                            <p className="text-slate-500 text-sm">Controls randomness and creativity in AI outputs</p>
                        </div>
                    </div>
                    
                    <div className="grid md:grid-cols-2 gap-8">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-4">
                                Temperature: <span className="text-indigo-600">{temperature.toFixed(1)}</span>
                            </label>
                            <input
                                type="range"
                                min="0"
                                max="2"
                                step="0.1"
                                value={temperature}
                                onChange={(e) => setTemperature(parseFloat(e.target.value))}
                                className="w-full h-3 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600"
                            />
                            
                            <div className="flex justify-between text-xs text-slate-500 mt-2">
                                <span>0.0 (Deterministic)</span>
                                <span>1.0 (Balanced)</span>
                                <span>2.0 (Creative)</span>
                            </div>
                            
                            <div className="mt-6 space-y-3">
                                <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                                    <div className="text-xs font-bold text-slate-500 mb-1">Creativity Level</div>
                                    <div className="text-lg font-bold text-indigo-600">{output.creativity}</div>
                                </div>
                                
                                <div className="bg-gradient-to-r from-orange-50 to-red-50 rounded-lg p-4 border border-orange-200">
                                    <div className="text-xs font-bold text-slate-700 mb-2">Example Output:</div>
                                    <div className="text-sm text-slate-800 italic">"{output.text}"</div>
                                    <div className="text-xs text-slate-600 mt-2">{output.desc}</div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-xl p-6">
                            <h3 className="font-bold text-slate-800 mb-4">How Temperature Works</h3>
                            <div className="space-y-4">
                                <div className="bg-white rounded-lg p-4 border border-slate-200">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm font-bold text-slate-700">Low (0.0 - 0.5)</span>
                                        <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">Precise</span>
                                    </div>
                                    <p className="text-xs text-slate-600">
                                        Model picks the most likely word. Good for factual, consistent outputs.
                                    </p>
                                </div>
                                
                                <div className="bg-white rounded-lg p-4 border border-slate-200">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm font-bold text-slate-700">Medium (0.5 - 1.0)</span>
                                        <span className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Balanced</span>
                                    </div>
                                    <p className="text-xs text-slate-600">
                                        Balanced between accuracy and creativity. Best for most conversational AI.
                                    </p>
                                </div>
                                
                                <div className="bg-white rounded-lg p-4 border border-slate-200">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm font-bold text-slate-700">High (1.0 - 2.0)</span>
                                        <span className="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded">Creative</span>
                                    </div>
                                    <p className="text-xs text-slate-600">
                                        More random, creative outputs. Good for creative writing, brainstorming.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 3. ZERO-SHOT VS FEW-SHOT LEARNING ---
        const LearningComparison = () => {
            const [selectedType, setSelectedType] = useState('zero');
            
            const examples = {
                zero: {
                    name: 'Zero-Shot Learning',
                    desc: 'Model performs tasks without any examples',
                    prompt: 'Translate "Hello" to French:',
                    output: 'Bonjour',
                    explanation: 'The model uses its pre-trained knowledge without seeing any translation examples.',
                    icon: '🎯',
                    color: 'from-blue-500 to-cyan-600'
                },
                few: {
                    name: 'Few-Shot Learning',
                    desc: 'Model sees a few examples before performing the task',
                    prompt: 'Examples:\n1. Dog → Chien\n2. Cat → Chat\n3. Bird → Oiseau\n\nTranslate "Hello" to French:',
                    output: 'Bonjour',
                    explanation: 'The model learns the pattern from examples and applies it to new inputs.',
                    icon: '📚',
                    color: 'from-purple-500 to-pink-600'
                }
            };
            
            const current = examples[selectedType];
            
            return (
                <div className="glass-card rounded-3xl p-6 lg:p-8 shadow-xl mb-8 animate-fade-in animate-delay-200">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl text-white">
                            <Target size={28} />
                        </div>
                        <div>
                            <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">Zero-Shot vs Few-Shot Learning</h2>
                            <p className="text-slate-500 text-sm">Understanding how LLMs learn from examples</p>
                        </div>
                    </div>
                    
                    <div className="grid md:grid-cols-2 gap-4 mb-6">
                        <button
                            onClick={() => setSelectedType('zero')}
                            className={`p-4 rounded-xl border-2 transition-all ${
                                selectedType === 'zero'
                                    ? 'bg-gradient-to-r from-blue-500 to-cyan-600 text-white border-blue-600 shadow-lg'
                                    : 'bg-white border-slate-200 hover:bg-slate-50'
                            }`}
                        >
                            <div className="text-2xl mb-2">🎯</div>
                            <div className="font-bold text-sm">Zero-Shot</div>
                            <div className={`text-xs ${selectedType === 'zero' ? 'text-blue-100' : 'text-slate-500'}`}>
                                No examples needed
                            </div>
                        </button>
                        
                        <button
                            onClick={() => setSelectedType('few')}
                            className={`p-4 rounded-xl border-2 transition-all ${
                                selectedType === 'few'
                                    ? 'bg-gradient-to-r from-purple-500 to-pink-600 text-white border-purple-600 shadow-lg'
                                    : 'bg-white border-slate-200 hover:bg-slate-50'
                            }`}
                        >
                            <div className="text-2xl mb-2">📚</div>
                            <div className="font-bold text-sm">Few-Shot</div>
                            <div className={`text-xs ${selectedType === 'few' ? 'text-purple-100' : 'text-slate-500'}`}>
                                Uses examples
                            </div>
                        </button>
                    </div>
                    
                    <div className={`bg-gradient-to-br ${current.color} rounded-xl p-6 text-white`}>
                        <div className="flex items-center gap-3 mb-4">
                            <div className="text-4xl">{current.icon}</div>
                            <div>
                                <h3 className="text-xl font-bold">{current.name}</h3>
                                <p className="text-sm opacity-90">{current.desc}</p>
                            </div>
                        </div>
                        
                        <div className="bg-white/10 backdrop-blur-sm rounded-lg p-4 mb-4">
                            <div className="text-xs font-bold mb-2 opacity-80">PROMPT:</div>
                            <div className="font-mono text-sm bg-white/20 p-3 rounded whitespace-pre-wrap">
                                {current.prompt}
                            </div>
                        </div>
                        
                        <div className="bg-white/10 backdrop-blur-sm rounded-lg p-4 mb-4">
                            <div className="text-xs font-bold mb-2 opacity-80">OUTPUT:</div>
                            <div className="font-bold text-lg">{current.output}</div>
                        </div>
                        
                        <div className="bg-white/20 backdrop-blur-sm rounded-lg p-4">
                            <div className="text-xs font-bold mb-2">💡 Explanation:</div>
                            <p className="text-sm">{current.explanation}</p>
                        </div>
                    </div>
                    
                    <div className="mt-6 grid md:grid-cols-2 gap-4">
                        <div className="bg-blue-50 rounded-lg p-4 border border-blue-200">
                            <h4 className="font-bold text-blue-900 mb-2">Zero-Shot Use Cases</h4>
                            <ul className="text-xs text-blue-700 space-y-1">
                                <li>• General question answering</li>
                                <li>• Translation (if trained)</li>
                                <li>• Sentiment analysis</li>
                                <li>• Text classification</li>
                            </ul>
                        </div>
                        
                        <div className="bg-purple-50 rounded-lg p-4 border border-purple-200">
                            <h4 className="font-bold text-purple-900 mb-2">Few-Shot Use Cases</h4>
                            <ul className="text-xs text-purple-700 space-y-1">
                                <li>• Custom formatting</li>
                                <li>• Domain-specific tasks</li>
                                <li>• Complex reasoning patterns</li>
                                <li>• Style imitation</li>
                            </ul>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 4. TOKENS EXPLAINED ---
        const TokensVisualizer = () => {
            const [inputText, setInputText] = useState("Hello, how are you?");
            
            const tokenize = (text) => {
                // Simplified tokenization visualization
                const words = text.split(/\s+/);
                const tokens = [];
                words.forEach((word, idx) => {
                    if (word.length > 6) {
                        // Long words might be split
                        tokens.push({ text: word.slice(0, Math.ceil(word.length/2)), isPartial: true });
                        tokens.push({ text: word.slice(Math.ceil(word.length/2)), isPartial: true, isContinuation: true });
                    } else {
                        tokens.push({ text: word, isPartial: false });
                    }
                });
                return tokens;
            };
            
            const tokens = tokenize(inputText);
            const tokenCount = tokens.length;
            
            return (
                <div className="glass-card rounded-3xl p-6 lg:p-8 shadow-xl mb-8 animate-fade-in animate-delay-300">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl text-white">
                            <Cpu size={28} />
                        </div>
                        <div>
                            <h2 className="text-2xl lg:text-3xl font-bold text-slate-800">Tokens Explained</h2>
                            <p className="text-slate-500 text-sm">Understanding how AI processes text</p>
                        </div>
                    </div>
                    
                    <div className="space-y-6">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-2">Enter Text:</label>
                            <input
                                type="text"
                                value={inputText}
                                onChange={(e) => setInputText(e.target.value)}
                                className="w-full border-2 border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-cyan-500 outline-none"
                                placeholder="Type something..."
                            />
                        </div>
                        
                        <div className="bg-slate-50 rounded-xl p-4 border-2 border-slate-200">
                            <div className="flex items-center justify-between mb-4">
                                <span className="font-bold text-slate-700">Token Count: <span className="text-cyan-600">{tokenCount}</span></span>
                                <span className="text-xs text-slate-500">~{Math.ceil(tokenCount * 0.75)} words</span>
                            </div>
                            
                            <div className="flex flex-wrap gap-2">
                                {tokens.map((token, idx) => (
                                    <div
                                        key={idx}
                                        className={`token-visual px-3 py-2 rounded-lg border-2 font-mono text-sm ${
                                            token.isPartial
                                                ? 'bg-yellow-100 border-yellow-300 text-yellow-800'
                                                : 'bg-cyan-100 border-cyan-300 text-cyan-800'
                                        }`}
                                    >
                                        {token.isContinuation && '...'}
                                        {token.text}
                                        {token.isPartial && !token.isContinuation && '...'}
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="grid md:grid-cols-3 gap-4">
                            <div className="bg-white rounded-lg p-4 border border-slate-200">
                                <h4 className="font-bold text-slate-800 mb-2 text-sm">What are Tokens?</h4>
                                <p className="text-xs text-slate-600">
                                    Tokens are pieces of text (words, subwords, or characters) that AI models process. 
                                    They're the basic units of input/output.
                                </p>
                            </div>
                            
                            <div className="bg-white rounded-lg p-4 border border-slate-200">
                                <h4 className="font-bold text-slate-800 mb-2 text-sm">Token Limits</h4>
                                <p className="text-xs text-slate-600">
                                    Models have context windows (e.g., 8K, 32K, 128K tokens). 
                                    This limits how much text you can send/receive in one request.
                                </p>
                            </div>
                            
                            <div className="bg-white rounded-lg p-4 border border-slate-200">
                                <h4 className="font-bold text-slate-800 mb-2 text-sm">Cost Impact</h4>
                                <p className="text-xs text-slate-600">
                                    Most AI APIs charge per token. Longer prompts = more tokens = higher cost. 
                                    Efficient prompting saves money!
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 5. CONTEXT ENGINEERING ---
        const ContextEngineering = () => {
            const MAX_TOKENS = 100;
            const [blocks, setBlocks] = useState([
                { id: 'sys', type: 'system', name: 'System Instructions', tokens: 20, active: true, desc: "Global rules (e.g. 'You are helpful')" },
                { id: 'rag', type: 'rag', name: 'RAG: Retrieved Docs', tokens: 45, active: false, desc: "External data from Vector DB" },
                { id: 'hist', type: 'history', name: 'Chat History (Last 5)', tokens: 30, active: false, desc: "Previous user/assistant turn" },
                { id: 'few', type: 'example', name: 'Few-Shot Examples', tokens: 25, active: false, desc: "Showing the AI how to behave" },
            ]);
            const userQuery = { tokens: 10, name: "User Query" };

            const currentUsage = blocks.filter(b => b.active).reduce((acc, b) => acc + b.tokens, 0) + userQuery.tokens;
            const isOverflow = currentUsage > MAX_TOKENS;

            const toggleBlock = (id) => {
                setBlocks(blocks.map(b => b.id === id ? { ...b, active: !b.active } : b));
            };

            return (

                else if (q.includes("computer") || q.includes("ai")) { targetX = 82; targetY = 82; }
                else if (q.includes("pet") || q.includes("meow")) { targetX = 22; targetY = 22; }

                let nearest = null;
                let minDist = Infinity;
                points.forEach(p => {

                        nearest = p;

                { id: 'learning', keywords: ['zero-shot', 'few-shot', 'learning'], component: <LearningComparison key="learning" /> },
                { id: 'tokens', keywords: ['tokens', 'tokenization', 'context'], component: <TokensVisualizer key="tokens" /> },
                { id: 'context', keywords: ['context engineering', 'context window'], component: <ContextEngineering key="context" /> },
                { id: 'rag', keywords: ['rag', 'retrieval', 'vector'], component: <RAGVisualizer key="rag" /> },
                { id: 'agents', keywords: ['agents', 'agentic', 'autonomous'], component: <AIAgentsVisualizer key="agents" /> }
            ];

            const getMatchingConcepts = (query) => {
                if (!query.trim()) return concepts;
                const q = query.toLowerCase();
                return concepts.filter(c => 
                    c.keywords.some(kw => kw.includes(q) || q.includes(kw))
                );
            };

            const visibleConcepts = getMatchingConcepts(searchQuery);

            return (
                <div className="content-wrapper max-w-7xl mx-auto py-8 lg:py-12 px-4 lg:px-8">
                    <header className="mb-10 lg:mb-16 text-center animate-fade-in">
                        <div className="inline-block mb-4">
                            <div className="glass-card px-4 py-2 rounded-full text-xs font-semibold text-indigo-600 uppercase tracking-wider shadow-md">
                                AI Concepts & Trends
                            </div>
                        </div>
                        <h1 className="text-4xl lg:text-6xl font-black tracking-tight mb-4 text-slate-900">
                            <span className="gradient-text">AI Buzzwords</span> Explained
                        </h1>
                        <p className="text-lg lg:text-xl text-slate-600 max-w-3xl mx-auto">
                            Interactive visualizations of the latest AI concepts, trends, and technologies
                        </p>
                    </header>

                    <SearchBar searchQuery={searchQuery} setSearchQuery={setSearchQuery} />

                    {visibleConcepts.length > 0 ? (
                        visibleConcepts.map(c => c.component)
                    ) : (
                        <div className="glass-card rounded-2xl p-8 text-center">
                            <div className="text-4xl mb-4">🔍</div>
                            <h3 className="text-xl font-bold text-slate-800 mb-2">No matches found</h3>
                            <p className="text-slate-600">Try searching for: transformer, temperature, RAG, agents, tokens, or context</p>
                        </div>
                    )}

                    <footer className="text-center text-slate-500 text-sm mt-12 py-6 border-t border-slate-200/50">
                        <div className="glass-card rounded-2xl p-4 max-w-2xl mx-auto">
                            <p>Interactive AI Concepts Visualization • 2024</p>
                        </div>
                    </footer>
                </div>
            );
        };

        try {
            const rootElement = document.getElementById('root');
            if (!rootElement) {
                throw new Error('Root element not found');
            }
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } catch (error) {
            console.error('Error rendering React app:', error);
            document.getElementById('root').innerHTML = '<div style="padding: 20px; color: red;">Error loading application. Please check the console.</div>';
        }
    </script>
</body>
</html>
